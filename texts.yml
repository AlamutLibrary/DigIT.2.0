# Alamut Library — Digital Ismaili Texts
# texts.yml — Manifest of all texts in this repository
#
# Each entry tells the app where to find the raw text and its metadata YAML.
# Paths are relative to the root of this repository.
# Supported text extensions: .ara1 .ara2 .per1 .per2 .txt .md (OpenITI format)

